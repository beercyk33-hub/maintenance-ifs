<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maintenance IFS</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

<!-- Tailwind for utility classes -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- SweetAlert2 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.7/dist/sweetalert2.min.css" />
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.7/dist/sweetalert2.all.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

<!-- jsPDF + autoTable + html2canvas -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<!-- SheetJS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg-1: #050816;
    --bg-2: #0a1d4a;
    --bg-3: #0a4a8c;
    --bg-4: #11d4ff;
    --ink: #f1f6ff;
    --ink-dim: rgba(241, 246, 255, 0.65);
    --ink-faint: rgba(241, 246, 255, 0.45);
    --line: rgba(255, 255, 255, 0.10);
    --line-strong: rgba(255, 255, 255, 0.18);
    --glass: rgba(255, 255, 255, 0.06);
    --glass-strong: rgba(255, 255, 255, 0.10);
    --accent: #38e0ff;
    --accent-2: #6c8cff;
    --good: #34e3a5;
    --warn: #ffc04b;
    --bad: #ff5a7a;
    --info: #6cb8ff;
  }
  * { box-sizing: border-box; }
  html, body {
    background: #02040d;
    color: var(--ink);
    font-family: 'Sarabun','Noto Sans Thai',-apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    margin: 0;
    min-height: 100vh;
  }
  body {
    background:
      radial-gradient(1100px 700px at 12% -10%, rgba(108, 140, 255, 0.18), transparent 60%),
      radial-gradient(900px 600px at 95% 0%, rgba(17, 212, 255, 0.16), transparent 65%),
      radial-gradient(1200px 800px at 50% 110%, rgba(56, 224, 255, 0.10), transparent 60%),
      linear-gradient(180deg, #02040d 0%, #050a23 18%, #061640 38%, #053b75 65%, #0a73b8 100%);
    background-attachment: fixed;
  }
  /* Animated glow blobs */
  body::before, body::after {
    content: "";
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.5;
    z-index: 0;
  }
  body::before {
    width: 480px; height: 480px;
    background: radial-gradient(circle, rgba(56,224,255,0.45), transparent 70%);
    top: -120px; left: -120px;
    animation: drift1 18s ease-in-out infinite alternate;
  }
  body::after {
    width: 560px; height: 560px;
    background: radial-gradient(circle, rgba(108,140,255,0.35), transparent 70%);
    bottom: -200px; right: -160px;
    animation: drift2 24s ease-in-out infinite alternate;
  }
  @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(80px,60px); } }
  @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-90px,-50px); } }

  #root { position: relative; z-index: 1; }

  /* Glass surface */
  .glass {
    background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    border: 1px solid var(--line-strong);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    box-shadow:
      0 30px 60px -28px rgba(2, 8, 30, 0.7),
      inset 0 1px 0 rgba(255, 255, 255, 0.07);
  }
  .glass-soft {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    backdrop-filter: blur(18px) saturate(130%);
    -webkit-backdrop-filter: blur(18px) saturate(130%);
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 0.55rem;
    padding: 0.7rem 1.15rem;
    border-radius: 1rem;
    font-weight: 600;
    font-size: 0.92rem;
    transition: all 0.22s ease;
    border: 1px solid var(--line-strong);
    background: rgba(255,255,255,0.04);
    color: var(--ink);
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover {
    transform: translateY(-1px);
    background: rgba(255,255,255,0.10);
    border-color: rgba(255,255,255,0.28);
    box-shadow: 0 14px 32px -16px rgba(56, 224, 255, 0.35);
  }
  .btn-primary {
    background: linear-gradient(135deg, #38e0ff 0%, #6c8cff 100%);
    color: #061227;
    border-color: transparent;
    box-shadow: 0 14px 32px -10px rgba(56, 224, 255, 0.5);
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, #5cebff 0%, #8aa3ff 100%);
    box-shadow: 0 18px 38px -10px rgba(56, 224, 255, 0.65);
  }
  .btn-danger { background: linear-gradient(135deg, #ff5a7a, #ff8a4a); color: #fff; border-color: transparent; }
  .btn-good { background: linear-gradient(135deg, #34e3a5, #1dc6e0); color: #04231a; border-color: transparent; }
  .btn-ghost { background: transparent; border-color: var(--line); }
  .btn-sm { padding: 0.45rem 0.8rem; font-size: 0.82rem; border-radius: 0.75rem; }

  /* Form controls */
  .field {
    display: flex; flex-direction: column; gap: 0.4rem;
  }
  .field label {
    font-size: 0.78rem; font-weight: 600;
    color: var(--ink-dim); letter-spacing: 0.01em;
  }
  .input, .select, .textarea {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--line-strong);
    border-radius: 0.9rem;
    padding: 0.7rem 0.9rem;
    color: var(--ink);
    font-family: inherit;
    font-size: 0.93rem;
    transition: all 0.18s ease;
    outline: none;
  }
  .input:focus, .select:focus, .textarea:focus {
    border-color: rgba(56,224,255,0.7);
    background: rgba(255,255,255,0.10);
    box-shadow: 0 0 0 4px rgba(56,224,255,0.15);
  }
  .textarea { min-height: 90px; resize: vertical; }
  .select option { background: #0a1d4a; color: var(--ink); }

  /* Tags / badges */
  .tag {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.22rem 0.6rem;
    font-size: 0.74rem;
    font-weight: 600;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--line);
    color: var(--ink);
    white-space: nowrap;
  }
  .tag-good    { background: rgba(52,227,165,0.16); border-color: rgba(52,227,165,0.4); color: #8af2c8; }
  .tag-warn    { background: rgba(255,192,75,0.16); border-color: rgba(255,192,75,0.4); color: #ffd580; }
  .tag-bad     { background: rgba(255,90,122,0.16); border-color: rgba(255,90,122,0.4); color: #ffa1b3; }
  .tag-info    { background: rgba(108,184,255,0.16); border-color: rgba(108,184,255,0.4); color: #a8d2ff; }
  .tag-muted   { color: var(--ink-faint); }

  /* Table */
  .tbl-wrap { overflow: auto; border-radius: 1.25rem; }
  .tbl { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 720px; }
  .tbl th {
    text-align: left;
    font-size: 0.74rem;
    font-weight: 700;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: rgba(255,255,255,0.04);
    padding: 0.7rem 0.9rem;
    position: sticky; top: 0;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .tbl td {
    padding: 0.75rem 0.9rem;
    font-size: 0.88rem;
    border-bottom: 1px solid var(--line);
    color: var(--ink);
    vertical-align: middle;
  }
  .tbl tbody tr { transition: background 0.15s ease; }
  .tbl tbody tr:hover { background: rgba(255,255,255,0.04); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }

  /* Nav */
  .nav-link {
    display: flex; align-items: center; gap: 0.65rem;
    padding: 0.7rem 0.9rem;
    border-radius: 0.85rem;
    color: var(--ink-dim);
    font-weight: 500;
    font-size: 0.92rem;
    cursor: pointer;
    transition: all 0.18s ease;
    border: 1px solid transparent;
    position: relative;
  }
  .nav-link:hover {
    color: var(--ink);
    background: rgba(255,255,255,0.05);
  }
  .nav-link.active {
    color: var(--ink);
    background: linear-gradient(135deg, rgba(56,224,255,0.18), rgba(108,140,255,0.18));
    border-color: rgba(56,224,255,0.3);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .nav-link.active::before {
    content: ""; position: absolute; left: -1px; top: 12px; bottom: 12px;
    width: 3px; border-radius: 3px;
    background: linear-gradient(180deg, #38e0ff, #6c8cff);
  }

  /* KPI cards */
  .kpi {
    position: relative;
    overflow: hidden;
  }
  .kpi::after {
    content: "";
    position: absolute;
    top: -40%; right: -30%;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--kpi-color, rgba(56,224,255,0.4)), transparent 70%);
    opacity: 0.5;
    filter: blur(20px);
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(2,4,15,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
    animation: fadeIn 0.2s ease;
  }
  .modal-body {
    width: 100%;
    max-height: 88vh;
    overflow: auto;
    border-radius: 1.5rem;
    padding: 1.75rem;
    animation: slideUp 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* Status dot */
  .dot {
    width: 10px; height: 10px; border-radius: 50%; display: inline-block;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.08);
  }
  .dot-good { background: #34e3a5; box-shadow: 0 0 12px #34e3a5, 0 0 0 3px rgba(52,227,165,0.18); animation: pulseG 2s infinite; }
  .dot-bad  { background: #ff5a7a; box-shadow: 0 0 12px #ff5a7a, 0 0 0 3px rgba(255,90,122,0.18); }
  .dot-warn { background: #ffc04b; box-shadow: 0 0 12px #ffc04b, 0 0 0 3px rgba(255,192,75,0.18); animation: pulseW 1.2s infinite; }
  @keyframes pulseG { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
  @keyframes pulseW { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Heading utilities */
  .h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.01em; }
  .h2 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.005em; }
  .h3 { font-size: 1rem; font-weight: 700; }
  .num { font-variant-numeric: tabular-nums; }

  /* Swal theme override */
  .swal2-popup {
    background: rgba(8, 16, 44, 0.92) !important;
    color: var(--ink) !important;
    border-radius: 1.5rem !important;
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    font-family: 'Sarabun','Noto Sans Thai',sans-serif !important;
  }
  .swal2-title, .swal2-html-container { color: var(--ink) !important; }
  .swal2-styled.swal2-confirm {
    background: linear-gradient(135deg, #38e0ff, #6c8cff) !important;
    color: #061227 !important;
    border-radius: 0.85rem !important;
    font-weight: 700 !important;
  }
  .swal2-styled.swal2-cancel {
    background: rgba(255,255,255,0.08) !important;
    color: var(--ink) !important;
    border-radius: 0.85rem !important;
  }
  .swal2-input, .swal2-select, .swal2-textarea {
    background: rgba(255,255,255,0.05) !important;
    color: var(--ink) !important;
    border: 1px solid rgba(255,255,255,0.18) !important;
    border-radius: 0.75rem !important;
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    transition: all 0.18s ease;
  }
  .swal2-input:focus, .swal2-select:focus, .swal2-textarea:focus {
    background: rgba(255,255,255,0.10) !important;
    border-color: rgba(56,224,255,0.7) !important;
    box-shadow: 0 0 0 4px rgba(56,224,255,0.15), inset 0 1px 0 rgba(255,255,255,0.08) !important;
    outline: none !important;
  }
  /* Dropdown options panel (native) — dark translucent */
  .swal2-select option {
    background: rgba(10, 22, 60, 0.95) !important;
    color: var(--ink) !important;
    padding: 0.4rem !important;
  }
  /* Validation message */
  .swal2-validation-message {
    background: rgba(255, 90, 122, 0.16) !important;
    color: #ffa1b3 !important;
    border-radius: 0.75rem !important;
  }

  /* Sidebar mobile */
  @media (max-width: 1024px) {
    .sidebar-mobile {
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 90;
      width: 250px;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      max-height: 100vh;
      overflow-y: auto;
    }
    .sidebar-mobile.open { transform: translateX(0); }
  }

  /* Mobile optimization */
  @media (max-width: 768px) {
    :root {
      font-size: 14px;
    }
    .h1 { font-size: 1.4rem; }
    .h2 { font-size: 1.1rem; }
    .h3 { font-size: 0.95rem; }

    .btn {
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      min-height: 44px;
    }
    .btn-sm {
      padding: 0.4rem 0.7rem;
      font-size: 0.8rem;
      min-height: 40px;
    }

    .input, .select, .textarea {
      font-size: 16px;
      padding: 0.65rem 0.85rem;
      min-height: 44px;
    }

    .glass {
      padding: 1rem;
    }

    .tbl th, .tbl td {
      padding: 0.6rem 0.7rem;
      font-size: 0.82rem;
    }

    /* Header optimization */
    .px-5.py-4 {
      padding: 0.75rem 1rem !important;
    }

    /* Reduce padding on smaller screens */
    .px-4.lg\:px-6 {
      padding-left: 0.75rem !important;
      padding-right: 0.75rem !important;
    }
    .py-4.lg\:py-6 {
      padding-top: 0.75rem !important;
      padding-bottom: 0.75rem !important;
    }

    /* Better touch targets */
    .nav-link {
      padding: 0.65rem 0.75rem;
      min-height: 44px;
    }

    /* Card spacing */
    .gap-4 { gap: 0.75rem; }
    .mt-4 { margin-top: 0.75rem; }
  }

  @media (max-width: 480px) {
    .h1 { font-size: 1.25rem; }
    .h2 { font-size: 1rem; }

    .btn { padding: 0.55rem 0.9rem; font-size: 0.8rem; }

    .glass { padding: 0.85rem; }

    .flex.items-center.gap-3.flex-wrap {
      gap: 0.5rem;
    }
  }

  /* Subtle entrance animation */
  .fade-in { animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>

<!-- App scripts (load in order; components first, then pages, then main app) -->
<script src="machines-seed.js"></script>
<script src="api.js"></script>
<script type="text/babel" data-presets="react" src="components.jsx"></script>
<script type="text/babel" data-presets="react" src="page-dashboard.jsx"></script>
<script type="text/babel" data-presets="react" src="page-machines.jsx"></script>
<script type="text/babel" data-presets="react" src="page-repair-request.jsx"></script>
<script type="text/babel" data-presets="react" src="page-repair-tracking.jsx"></script>
<script type="text/babel" data-presets="react" src="page-repair-record.jsx"></script>
<script type="text/babel" data-presets="react" src="page-pm.jsx"></script>
<script type="text/babel" data-presets="react" src="page-machine-history.jsx"></script>
<script type="text/babel" data-presets="react" src="page-reports.jsx"></script>
<script type="text/babel" data-presets="react" src="page-admin.jsx"></script>
<script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
